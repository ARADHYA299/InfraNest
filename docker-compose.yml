services:
  db:
    image: ankane/pgvector:latest
    container_name: saas_pgvector
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saas_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./saas-backend
    container_name: saas_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: saas_db
      DB_PORT: 5432
      JWT_SECRET: your_secret
    depends_on:
      - db
    volumes:
      - ./saas-backend:/app
    command: npm run dev

volumes:
  pgdata: